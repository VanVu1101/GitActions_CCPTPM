services:
  mysql:
    image: mysql:8.4
    container_name: simple-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shopdb
      MYSQL_USER: shopuser
      MYSQL_PASSWORD: shoppass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./LeVanVu
    container_name: simple-shop-backend
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Fontend
    container_name: simple-shop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: simple-shop-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  mysql_data: